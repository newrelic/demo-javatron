---
- block:
    - name: install supervisord
      package:
        name: supervisor
        state: present
      ignore_errors: yes
      become: yes

    # superlance provides /usr/local/bin/memmon, referenced in supervisord.conf
    # by the [eventlistener:memmon{{ service_id }}] entry. apt's `supervisor`
    # package does not include it. The linux/ variant installs it via pip;
    # debian/ was missing this step, causing `supervisorctl start memmonjava1`
    # to fail with "ERROR (no such file)".
    - name: install pip3 for superlance
      package:
        name: python3-pip
        state: present
      become: yes

    - name: install superlance (provides memmon)
      shell: pip3 install --break-system-packages -U superlance
      become: yes

    # pip3 installs the memmon entry-point script under /usr/local/bin, but
    # the apt-installed `supervisor` daemon on Debian 12 starts via systemd
    # with a PATH that does not always include /usr/local/bin. Symlinking
    # into /usr/bin guarantees memmon is on the daemon's PATH at runtime
    # (so `supervisorctl start memmonjava1` doesn't ENOENT).
    - name: locate memmon after superlance install
      shell: which memmon
      register: memmon_path
      become: yes
      changed_when: false

    - name: symlink memmon into /usr/bin for supervisor PATH
      file:
        src: "{{ memmon_path.stdout }}"
        dest: /usr/bin/memmon
        state: link
        force: yes
      when: memmon_path.stdout != "/usr/bin/memmon"
      become: yes

    - name: Start supervisord
      service:
        name: '{{ item }}'
        enabled: yes
      with_items:
        - supervisor
      become: yes

    - name: check if supervisord is running
      shell: pgrep supervisord | wc -l
      register: supervisord_running

    - name: start supervisord (async)
      command: service supervisor restart
      when: supervisord_running.stdout|int == 0
      async: 60
      poll: 0
      become: yes
